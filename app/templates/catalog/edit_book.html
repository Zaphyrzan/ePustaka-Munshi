{% extends "base.html" %}

{% block title %}Edit Book - ePustaka Munshi{% endblock %}
{% block page_title %}Edit Book{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-8">
        <div class="card table-card">
            <div class="card-header bg-transparent">
                <h5 class="mb-0"><i class="bi bi-pencil text-primary"></i> Edit Book</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="title" name="title" value="{{ book.title }}" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="author" class="form-label">Author</label>
                            <input type="text" class="form-control" id="author" name="author" value="{{ book.author or '' }}">
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="isbn" class="form-label">ISBN</label>
                            <input type="text" class="form-control" id="isbn" name="isbn" value="{{ book.isbn or '' }}">
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="publisher" class="form-label">Publisher</label>
                            <input type="text" class="form-control" id="publisher" name="publisher" value="{{ book.publisher or '' }}">
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="publication_year" class="form-label">Publication Year</label>
                            <input type="number" class="form-control" id="publication_year" name="publication_year" value="{{ book.publication_year or '' }}">
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label for="category" class="form-label">Category</label>
                            <input type="text" class="form-control" id="category" name="category" value="{{ book.category or '' }}">
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label for="call_number" class="form-label">Call Number</label>
                            <input type="text" class="form-control" id="call_number" name="call_number" value="{{ book.call_number or '' }}">
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label for="language" class="form-label">Language</label>
                            <select class="form-select" id="language" name="language">
                                <option value="Malay" {% if book.language == 'Malay' %}selected{% endif %}>Malay</option>
                                <option value="English" {% if book.language == 'English' %}selected{% endif %}>English</option>
                                <option value="Chinese" {% if book.language == 'Chinese' %}selected{% endif %}>Chinese</option>
                                <option value="Tamil" {% if book.language == 'Tamil' %}selected{% endif %}>Tamil</option>
                                <option value="Arabic" {% if book.language == 'Arabic' %}selected{% endif %}>Arabic</option>
                            </select>
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label for="price" class="form-label">Price (RM)</label>
                            <input type="number" class="form-control" id="price" name="price" step="0.01" min="0" value="{{ book.price or '' }}">
                            <div class="form-text">For replacement/loss scenarios</div>
                        </div>
                        
                        <div class="col-12 mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3">{{ book.description or '' }}</textarea>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> Save Changes
                    </button>
                    <a href="{{ url_for('catalog.view_book', book_id=book.id) }}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-lg-4">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Danger Zone</h5>
            </div>
            <div class="card-body">
                <p class="text-muted">Permanently delete this book and all its copies.</p>
                <form method="POST" action="{{ url_for('catalog.delete_book', book_id=book.id) }}" onsubmit="return confirm('Are you sure you want to delete this book?');">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Delete Book
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
