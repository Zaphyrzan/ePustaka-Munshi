{% extends "base.html" %}

{% block title %}Add Copy - ePustaka Munshi{% endblock %}
{% block page_title %}Add Book Copy{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6">
        <div class="card table-card">
            <div class="card-header bg-transparent">
                <h5 class="mb-0">Add Copy to: {{ book.title }}</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="alert alert-info mb-3">
                        <i class="bi bi-info-circle"></i>
                        <strong>Auto-Generated:</strong> Accession Number and Barcode are automatically generated for each copy.
                    </div>
                    
                    <div class="mb-3">
                        <label for="condition" class="form-label">Condition</label>
                        <select class="form-select" id="condition" name="condition">
                            <option value="Good">Good</option>
                            <option value="Fair">Fair</option>
                            <option value="Poor">Poor</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="location" class="form-label">Shelf Location</label>
                        <input type="text" class="form-control" id="location" name="location" placeholder="e.g., Shelf A-3">
                    </div>
                    
                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="2"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> Add Copy
                    </button>
                    <a href="{{ url_for('catalog.view_book', book_id=book.id) }}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
